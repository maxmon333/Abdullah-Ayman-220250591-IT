<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="stylehelwan.css" />
    <title>Personal Course Organizer</title>
  </head>
  <body>
    <header>
      <div id="icon">
        <a href="index.html"><img src="images/pcoS.png" alt="icon" /></a>
      </div>
    </header>
    <nav>
      <div id="Home" class="button">
        <a href="index.html"><h2>Home</h2></a>
      </div>
      <div id="Add" class="button">
        <a href="add.html"><h2>Add Course</h2></a>
      </div>

      <div id="Course" class="button">
        <a href="myCourses.html"><h2>My Courses</h2></a>
      </div>

      <div id="Contact" class="button">
        <a href="contact.html"><h2>Contact Us</h2></a>
      </div>
    </nav>
    <div class="form-card">
      <h2 class="form-title">Register New Course</h2>
      <form id="addCourseForm">
        <div class="form-grid">
          <div class="input-group">
            <label>Course Name</label>
            <input
              type="text"
              placeholder="e.g. Advanced JavaScript"
              required
            />
          </div>

          <div class="input-group">
            <label>Platform</label>
            <input type="text" placeholder="e.g. Coursera, YouTube" required />
          </div>

          <div class="input-group">
            <label>Start Date</label>
            <input type="date" required />
          </div>

          <div class="input-group">
            <label>Current Status</label>
            <select required>
              <option value="pending">Planned</option>
              <option value="progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>

          <div class="input-group full-width">
            <label>Course URL / Link</label>
            <input type="url" placeholder="https://..." required />
          </div>
        </div>

        <button type="submit" class="submit-btn">
          Save Course to Organizer
        </button>
      </form>
    </div>
    <footer>helwan universty projects© Abdullah Ayman20250591</footer>
  </body>
</html>
